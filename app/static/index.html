<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Operacional Salesforce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@500;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="bg-grid"></div>

  <header class="topbar">
    <div class="brand">
      <img class="brand-logo" src="/logo_laranja.png" alt="Logo" />
      <h1>PAINEL OPERACIONAL</h1>
    </div>
    <div class="status">
      <div id="countdown">Proxima atualizacao em --s</div>
    </div>
  </header>

  <main class="dashboard">
    <section class="column" id="col-1">
      <h2>ATENDIMENTO TRANSPORTADORA</h2>
      <div class="counter" id="counter-1">0 Chamados</div>
      <div class="rows" id="rows-1"></div>
    </section>

    <section class="column" id="col-2">
      <h2>ATENDIMENTO NO CLIENTE</h2>
      <div class="counter" id="counter-2">0 Chamados</div>
      <div class="rows" id="rows-2"></div>
    </section>

    <section class="column" id="col-3">
      <h2>ATENDIMENTOS DO DIA</h2>
      <div class="counter" id="counter-3">0 Chamados</div>
      <div class="rows" id="rows-3"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
